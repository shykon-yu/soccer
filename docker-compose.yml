# soccer_php 开发环境（OrbStack / Docker Compose）
# 启动：docker compose up -d --build
# 停止：docker compose down
# 停止并清除数据卷：docker compose down -v

services:
  # ---------- PHP-FPM (Laravel 应用) ----------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: soccer_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      # Docker 模式下的连接项（若容器内 .env 未覆盖则生效）
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - soccer-network

  # ---------- Nginx (Web 服务) ----------
  nginx:
    image: nginx:1.25-alpine
    container_name: soccer_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - soccer-network

  # ---------- MySQL 8 ----------
  mysql:
    image: mysql:8.0
    container_name: soccer_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: soccer
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: soccer
      MYSQL_PASSWORD: soccer
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soccer-network

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: soccer_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soccer-network

  # ---------- RabbitMQ 3 (带管理后台) ----------
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: soccer_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理后台
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - soccer-network

  # ---------- phpMyAdmin ----------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.1
    platform: linux/amd64
    container_name: soccer_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - soccer-network

networks:
  soccer-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
